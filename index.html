//////////////////////////////////////////////////
// 점수 애니메이션

function animateScore(finalScore,name,fortuneText){
let current=0;
let result=document.getElementById("result");

let interval=setInterval(()=>{
current++;
result.innerHTML=`점수 계산 중... <b>${current}점</b>`;
if(current>=finalScore){
clearInterval(interval);

result.innerHTML=`
${name}님의 오늘 점수는 <b>${finalScore}점</b> 입니다!<br><br>
💬 ${fortuneText}
`;

result.classList.add("show");
document.getElementById("card").classList.add("small");
document.getElementById("shareBtn").classList.add("show");
}
},15);
}

//////////////////////////////////////////////////
// 운세 보기 (참여 제한 제거됨)
//////////////////////////////////////////////////

document.getElementById("fortuneBtn").addEventListener("click",async()=>{

let name=document.getElementById("nickname").value.trim();
if(!name){alert("닉네임 입력");return;}

let hash=0;
for(let c of name+today)
hash=c.charCodeAt(0)+((hash<<5)-hash);

hash=Math.abs(hash);
let score=(hash%40)+60;

let fortuneText=getRandomFortune();

animateScore(score,name,fortuneText);

await addDoc(collection(db,"scores"),{
name,score,date:today,createdAt:serverTimestamp()
});

});

//////////////////////////////////////////////////
// TOP3 애니메이션 + 닉네임 중복 제거
//////////////////////////////////////////////////

onSnapshot(collection(db,"scores"),snapshot=>{

let map={};

snapshot.forEach(doc=>{
let data=doc.data();
if(data.date===today){
if(!map[data.name]||map[data.name]<data.score){
map[data.name]=data.score;
}
}
});

let list=[];
for(let n in map){
list.push({name:n,score:map[n]});
}

list.sort((a,b)=>b.score-a.score);

let html="";
for(let i=0;i<3&&i<list.length;i++){
html+=`<div class="rank-item">${i+1}등 ${list[i].name} (${list[i].score}점)</div>`;
}

document.getElementById("top3List").innerHTML=
html||"아직 기록 없음";

});

//////////////////////////////////////////////////

window.sendInquiry=async function(){
let name=document.getElementById("nickname").value.trim();
if(!name){alert("닉네임 입력 후 문의");return;}
let msg=prompt("문의 내용 입력");
if(!msg)return;

await addDoc(collection(db,"inquiries"),{
name,message:msg,date:today,createdAt:serverTimestamp()
});

alert("문의 전송 완료!");
};
